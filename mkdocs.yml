site_url : https://asalvadorc.github.io/Modelado_BD
site_name: Módulo BD - Modelado de Bases de Datos

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate
    - navigation.footer
    - navigation.path
    
  copyright: Licenciado bajo la licencia Creative Commons by-nc-nd

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

extra_css:
  - css/extra.css

markdown_extensions:
  - admonition
  - tables    
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Inicio: index.md
  - Modelo Entidad-Relación:
    - Objetivos y conocimientos previos: Model_E-R/objetivos_y_conocimientos_previos.md
    - 1. Introducción: Model_E-R/1_introduccion.md
    - 2. Ejemplo: Model_E-R/2_ejemplo.md
    - 3. Las Entidades del Modelo E/R: Model_E-R/3_las_entidades_del_modelo_er.md
    - Ejercicios: Model_E-R/ejercicios.md
    - 4. Las Relaciones del Modelo E/R: Model_E-R/4_las_relaciones_del_modelo_er.md
    - Ejercicios: Model_E-R/ejercicios0.md
    - 5. Relaciones de grado mayor que dos: Model_E-R/5_relaciones_de_grado_mayor_que_dos.md
    - 6. Modelo E/R Extendido: Model_E-R/6_modelo_er_extendido.md
    - 7. Restricciones externas: Model_E-R/7_restricciones_externas.md
    - Ejercicios: Model_E-R/ejercicios1.md
    - Información adicional: Model_E-R/informacion_adicional.md
  - Modelo Relacional:
    - Objetivos y conocimientos previos: Model_Relacional/objetivos_y_conocimientos_previos.md
    - 1. Introducción: Model_Relacional/1_introduccion.md
    - 2. Estructura del Modelo Relacional: Model_Relacional/2_estructura_del_modelo_relacional.md
    - 3. Restricciones: Model_Relacional/3_restricciones.md
    - 4. Transformación del M. E/R al M. Relacional: Model_Relacional/4_transformacion_del_m_er_al_m_relacional.md
    - 5. Lenguajes relacionales: Model_Relacional/5_lenguajes_relacionales.md
    - 6. Ejercicios: Model_Relacional/6_ejercicios.md  
  - Normalización:
    - Objetivos: Normalizacion/objetivos.md
    - 1. Introducción: Normalizacion/1_introduccion.md
    - 2. Primera Forma Normal (1FN): Normalizacion/2_primera_forma_normal_1fn.md
    - 3. Dependencia Funcional: Normalizacion/3_dependencia_funcional.md
    - 4. Segunda Forma Normal (2FN): Normalizacion/4_segunda_forma_normal_2fn.md
    - 5. Dependencia Funcional Transitiva: Normalizacion/5_dependencia_funcional_transitiva.md
    - 6. Tercera Forma Normal (3FN): Normalizacion/6_tercera_forma_normal_3fn.md
    - 7. Forma Normal Boyce-Codd (FNBC): Normalizacion/7_forma_normal_boycecodd_fnbc.md
    - Ejemplo Completo: Normalizacion/Ejemplo_completo.md
    - Resumen: Normalizacion/resumen.md
    - Ejercicios: Normalizacion/ejercicios.md